spring:
  datasource:
    url: jdbc:h2:mem:membershipdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    show-sql: true
    defer-datasource-initialization: true

    hibernate:
      ddl-auto: create

  sql:
    init:
      mode: always